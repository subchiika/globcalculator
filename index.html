    <style>
      /* ============================== */
      /*  ზოგადი სტილი                  */
      /* ============================== */
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #fdf2e9, #f8cfc9);
        margin: 0;
        padding: 0;
      }

      /* მთავარი კონტეინერი */
      .container {
        max-width: 580px;
        margin: 40px auto;
        padding: 30px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        transition: all 0.3s ease;
      }

      /* სათაური */
      h2 {
        text-align: center;
        color: #8b2e2e;
        font-size: 24px;
        margin-bottom: 18px;
      }

      /* Dropdown სტილი */
      select {
        width: 100%;
        padding: 10px 15px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #c4a3a3;
        margin-top: 10px;
        background: #fff;
        color: #333;
      }

      /* Searchable dropdown */
      select:focus {
        border-color: #b82828;
        box-shadow: 0 0 6px rgba(184, 40, 40, 0.4);
      }

      /* price სტილი */
      #price {
        margin-top: 22px;
        text-align: center;
        font-size: 20px;
        color: #b82828;
        font-weight: bold;
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      /* ჩარჩოს სტილი */
      hr {
        border: none;
        border-top: 1px solid #eee;
        margin: 18px 0;
      }

      /* Responsive დიზაინი */
      @media (max-width: 600px) {
        .container {
          margin: 20px;
          padding: 20px;
        }
        h2 {
          font-size: 20px;
        }
        select {
          font-size: 15px;
        }
        #price {
          font-size: 18px;
        }
      }
    </style>
  </head>

      /* ============================== */
      /* Functions */
      function updateLocations() {
        const auction = document.getElementById("auctionSelect").value;
        const locationSelect = document.getElementById("locationSelect");
        const priceDiv = document.getElementById("price");

        locationSelect.innerHTML = '<option value="">აირჩიე ლოკაცია</option>';
        priceDiv.style.opacity = 0;

        if (auction && data[auction]) {
          data[auction].forEach((loc, index) => {
            const option = document.createElement("option");
            option.value = index;
            option.textContent = loc.name;
            locationSelect.appendChild(option);
          });
        }
      }

      function showPrice() {
        const auction = document.getElementById("auctionSelect").value;
        const index = document.getElementById("locationSelect").value;
        const priceDiv = document.getElementById("price");

        if (auction && index !== "") {
          const loc = data[auction][index];
          priceDiv.innerHTML = "გზის ფასი: $" + loc.price;
          // animation
          setTimeout(() => {
            priceDiv.style.opacity = 1;
          }, 50);
        } else {
          priceDiv.style.opacity = 0;
        }
      }
